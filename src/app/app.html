<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">

        <div class="card-header bg-dark text-white">
          <h3>Gestion de actividades pwa</h3>
        </div>

        <div class="card-body">

          <p>
            Estado:
            <span
              class="badge"
              [ngClass]="conectado ? 'bg-success' : 'bg-danger'">
              {{ conectado ? 'En línea' : 'Offline' }}
            </span>
          </p>

          <div class="input-group mb-3">
            <input
              class="form-control"
              placeholder="Nueva actividad"
              [(ngModel)]="nuevaTarea">

            <button
              class="btn btn-primary"
              (click)="agregar()">
              Agregar
            </button>
          </div>

          <ul class="list-group">
            <li
              class="list-group-item d-flex justify-content-between align-items-center"
              *ngFor="let tarea of tareas; let i = index">

              <span
                (click)="cambiarEstado(tarea)"
                [style.text-decoration]="tarea.completada ? 'line-through' : 'none'">
                {{ tarea.nombre }}
              </span>

              <button
                class="btn btn-danger btn-sm"
                (click)="eliminar(i)">
                Eliminar
              </button>
            </li>
          </ul>

        </div>
      </div>
    </div>
  </div>
</div>
